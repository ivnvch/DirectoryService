services:

  directory-backend-service:
    container_name: directory-backend-service
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8001
    restart: always

  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:etc/nginx/nginx.conf:ro
    depends_on:
      - directory-backend-service
    restart: always

  seq:
    container_name: seq
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "8081:80"
      - "5341:5341"
    restart: always


  postgres:
      container_name: directory-postgres
      image: postgres
      restart: always
      environment:          
        POSTGRES_DB: directory_service_db
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
      ports:
        - "5435:5432"
      volumes:
        - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

     