services:

  directory-backend-service:
    container_name: directory-backend-service
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GITHUB_NUGET_USERNAME: ${GITHUB_NUGET_USERNAME:-ivnvch}
        GITHUB_NUGET_OWNER: ${GITHUB_NUGET_OWNER:-ivnvch}
      secrets:
        - github_token
    ports:
      - "8001:8001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8001
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - directory-backend-service
    restart: always

  seq:
    container_name: seq
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "8081:80"
      - "5341:5341"
    restart: always

  redis:
    container_name: redis
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    

  postgres:
    container_name: directory-postgres
    image: postgres
    restart: always
    environment:
      POSTGRES_DB: directory_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d directory_service_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres-fileService:
    container_name: file_service_db
    image: postgres
    restart: always
    environment:
      POSTGRES_DB: file_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - postgres-file-service-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d file_service_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio:
    container_name: minio-fileService
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: adminadmin
    # S3 API — :9000, консоль — :9001; каталог /data для постоянного хранения
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    restart: always

secrets:
  github_token:
    file: .github_token

volumes:
  postgres-data:
  postgres-file-service-data:
  minio-data:

     